server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store";
        try_files /index.html =404;
    }

    location / {
        expires -1;
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }
}
