spring.application.name=fleet-service
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
security.jwt.secret=${JWT_SECRET:01234567890123456789012345678901}
springdoc.swagger-ui.url=/api/fleet/v3/api-docs
springdoc.swagger-ui.config-url=/api/fleet/v3/api-docs/swagger-config
springdoc.swagger-ui.oauth2-redirect-url=/api/fleet/swagger-ui/oauth2-redirect.html
