# App runs in Docker network; database host is the Postgres service/container name
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://fleet-postgres:5432/fleet_deploy}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fleet_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fleet_password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.h2.console.enabled=false
