spring.application.name=springboot3security
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=86400000
app.bootstrap-admin.username=${BOOTSTRAP_ADMIN_USERNAME:}
app.bootstrap-admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
profile.image.storage.path=${PROFILE_IMAGE_STORAGE_PATH:./profile-images}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.invitation.expiry-hours=${INVITATION_EXPIRY_HOURS:24}
app.mail.from=${MAIL_FROM:noreply@doccufleet.local}
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost,http://localhost:5173}
springdoc.swagger-ui.url=/api/auth/v3/api-docs
springdoc.swagger-ui.config-url=/api/auth/v3/api-docs/swagger-config
springdoc.swagger-ui.oauth2-redirect-url=/api/auth/swagger-ui/oauth2-redirect.html
