
services:
  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_DB: auth_deploy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_deploy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fleet-net

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: fleet/auth-service:local
    container_name: auth-service
    depends_on:
      auth-postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: 96394670290123498739012349851901
      BOOTSTRAP_ADMIN_USERNAME: admin
      BOOTSTRAP_ADMIN_EMAIL: admin@example.com
      BOOTSTRAP_ADMIN_PASSWORD: admin123
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - fleet-net

  # Add future microservices here using the same pattern:
  # service-name:
  #   build:
  #     context: ../service-name
  #     dockerfile: Dockerfile
  #   environment:
  #     SPRING_PROFILES_ACTIVE: docker
  #   depends_on:
  #     auth-postgres:
  #       condition: service_healthy
  #   networks:
  #     - fleet-net

networks:
  fleet-net:
    driver: bridge

volumes:
  auth-postgres-data:

