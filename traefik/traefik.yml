global:
  checkNewVersion: false
  sendAnonymousUsage: false

entryPoints:
  http:
    address: ":80"
  traefik:
    address: ":8080"

api:
  dashboard: true
  insecure: false

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: fleet-net
    watch: true
  file:
    filename: /dynamic_conf.yml
    watch: true

log:
  level: INFO

accessLog: {}
