http:
  routers:
    auth-service:
      rule: "PathPrefix(`/api/auth`)"
      entryPoints:
        - http
      service: auth-service
      middlewares:
        - auth-service-chain

    fleet-service:
      rule: "PathPrefix(`/api/fleet`)"
      entryPoints:
        - http
      service: fleet-service
      middlewares:
        - fleet-service-chain

    document-service:
      rule: "PathPrefix(`/api/documents`)"
      entryPoints:
        - http
      service: document-service
      middlewares:
        - document-service-chain

    dashboard:
      rule: "(Host(`traefik.localhost`) || Host(`localhost`)) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      entryPoints:
        - traefik
      service: api@internal
      middlewares:
        - dashboard-auth

  services:
    auth-service:
      loadBalancer:
        servers:
          - url: "http://auth-service:8080"
        passHostHeader: true

    fleet-service:
      loadBalancer:
        servers:
          - url: "http://fleet-service:8080"
        passHostHeader: true

    document-service:
      loadBalancer:
        servers:
          - url: "http://document-service:8080"
        passHostHeader: true

  middlewares:
    dashboard-auth:
      basicAuth:
        users:
          - "admin:$apr1$0BvvoY/i$Ze.R8quKQg9tifMlDjlwM/"
        removeHeader: true

    cors-headers:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        accessControlAllowHeaders:
          - Authorization
          - Content-Type
          - X-Requested-With
        accessControlAllowCredentials: true
        accessControlAllowOriginList:
          - "*"
        accessControlMaxAge: 100

    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 60s
        sourceCriterion:
          ipStrategy:
            depth: 1

    request-headers:
      headers:
        customRequestHeaders:
          X-Gateway: "Fleet-Manager-Traefik"
          X-Service-Version: "1.0"
        customResponseHeaders:
          X-Frame-Options: "SAMEORIGIN"
          X-Content-Type-Options: "nosniff"
          X-XSS-Protection: "1; mode=block"

    retry:
      retry:
        attempts: 3
        initialInterval: 100ms

    compression:
      compress:
        minResponseBodyBytes: 1000
        excludedContentTypes:
          - text/event-stream

    auth-service-chain:
      chain:
        middlewares:
          - rate-limit
          - cors-headers
          - request-headers
          - auth-strip-prefix
          - compression
          - retry

    auth-strip-prefix:
      stripPrefix:
        prefixes:
          - /api/auth

    fleet-strip-prefix:
      stripPrefix:
        prefixes:
          - /api/fleet

    document-strip-prefix:
      stripPrefix:
        prefixes:
          - /api/documents

    fleet-service-chain:
      chain:
        middlewares:
          - rate-limit
          - cors-headers
          - request-headers
          - fleet-strip-prefix
          - compression
          - retry

    document-service-chain:
      chain:
        middlewares:
          - rate-limit
          - cors-headers
          - request-headers
          - document-strip-prefix
          - compression
          - retry
