spring.application.name=parser-service
server.port=8080

security.jwt.secret=${JWT_SECRET:01234567890123456789012345678901}
security.internal.api-key=${PARSER_INTERNAL_API_KEY:dev-parser-internal-api-key-change-me-32}
parser.security.internal-api-key=${PARSER_INTERNAL_API_KEY:dev-parser-internal-api-key-change-me-32}
parser.name=ollama-document-parser
parser.version=1.0.0
parser.minimum-text-length=80
parser.good-text-length=400
parser.ocr.enabled=false
parser.ollama.base-url=${PARSER_OLLAMA_BASE_URL:${OLLAMA_BASE_URL:http://localhost:11434}}
parser.ollama.model=${PARSER_OLLAMA_MODEL:qwen2.5:3b}
parser.ollama.timeout=${PARSER_OLLAMA_TIMEOUT:60s}
ollama.base-url=${parser.ollama.base-url}

springdoc.swagger-ui.url=/api/parser/v3/api-docs
springdoc.swagger-ui.config-url=/api/parser/v3/api-docs/swagger-config
springdoc.swagger-ui.oauth2-redirect-url=/api/parser/swagger-ui/oauth2-redirect.html
