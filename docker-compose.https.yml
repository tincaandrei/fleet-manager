services:
  frontend:
    labels:
      traefik.http.middlewares.https-redirect.redirectscheme.scheme: https
      traefik.http.middlewares.https-redirect.redirectscheme.permanent: "true"
      traefik.http.routers.domain-http.entrypoints: web
      traefik.http.routers.domain-http.rule: Host(`${APP_HOST}`) || Host(`www.${APP_HOST}`)
      traefik.http.routers.domain-http.priority: "1000"
      traefik.http.routers.domain-http.middlewares: https-redirect
      traefik.http.routers.frontend-https.entrypoints: websecure
      traefik.http.routers.frontend-https.rule: (Host(`${APP_HOST}`) || Host(`www.${APP_HOST}`)) && PathPrefix(`/`)
      traefik.http.routers.frontend-https.priority: "1"
      traefik.http.routers.frontend-https.tls: "true"
      traefik.http.routers.frontend-https.tls.certresolver: letsencrypt
      traefik.http.routers.frontend-https.service: frontend

  auth-service:
    labels:
      traefik.http.routers.auth-https.entrypoints: websecure
      traefik.http.routers.auth-https.rule: (Host(`${APP_HOST}`) || Host(`www.${APP_HOST}`)) && PathPrefix(`/api/auth`)
      traefik.http.routers.auth-https.priority: "100"
      traefik.http.routers.auth-https.middlewares: auth-strip
      traefik.http.routers.auth-https.tls: "true"
      traefik.http.routers.auth-https.tls.certresolver: letsencrypt
      traefik.http.routers.auth-https.service: auth

  fleet-service:
    labels:
      traefik.http.routers.fleet-https.entrypoints: websecure
      traefik.http.routers.fleet-https.rule: (Host(`${APP_HOST}`) || Host(`www.${APP_HOST}`)) && PathPrefix(`/api/fleet`)
      traefik.http.routers.fleet-https.priority: "100"
      traefik.http.routers.fleet-https.middlewares: fleet-strip
      traefik.http.routers.fleet-https.tls: "true"
      traefik.http.routers.fleet-https.tls.certresolver: letsencrypt
      traefik.http.routers.fleet-https.service: fleet

  document-service:
    labels:
      traefik.http.routers.documents-https.entrypoints: websecure
      traefik.http.routers.documents-https.rule: (Host(`${APP_HOST}`) || Host(`www.${APP_HOST}`)) && PathPrefix(`/api/documents`)
      traefik.http.routers.documents-https.priority: "100"
      traefik.http.routers.documents-https.middlewares: documents-strip
      traefik.http.routers.documents-https.tls: "true"
      traefik.http.routers.documents-https.tls.certresolver: letsencrypt
      traefik.http.routers.documents-https.service: documents
      traefik.http.routers.notifications-https.entrypoints: websecure
      traefik.http.routers.notifications-https.rule: (Host(`${APP_HOST}`) || Host(`www.${APP_HOST}`)) && PathPrefix(`/api/notifications`)
      traefik.http.routers.notifications-https.priority: "100"
      traefik.http.routers.notifications-https.middlewares: notifications-strip
      traefik.http.routers.notifications-https.tls: "true"
      traefik.http.routers.notifications-https.tls.certresolver: letsencrypt
      traefik.http.routers.notifications-https.service: documents
