spring.application.name=document-service
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

security.jwt.secret=${JWT_SECRET:01234567890123456789012345678901}
document.storage.path=${DOCUMENT_STORAGE_PATH:./document-storage}
fleet.service.url=${FLEET_SERVICE_URL:http://localhost:8080}
auth.service.url=${AUTH_SERVICE_URL:http://localhost:8081}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-5.4-mini}
openai.timeout=${OPENAI_TIMEOUT:60s}
openai.max-output-tokens=${OPENAI_MAX_OUTPUT_TOKENS:1500}
openai.temperature=${OPENAI_TEMPERATURE:0}
document.parser.name=${DOCUMENT_PARSER_NAME:document-service-openai-parser}
document.parser.version=${DOCUMENT_PARSER_VERSION:1.0.0}
document.parser.minimum-text-length=${DOCUMENT_PARSER_MINIMUM_TEXT_LENGTH:30}
document.parser.good-text-length=${DOCUMENT_PARSER_GOOD_TEXT_LENGTH:600}
document.ocr.language=${DOCUMENT_OCR_LANGUAGE:ron+eng}
document.ocr.dpi=${DOCUMENT_OCR_DPI:300}
document.ocr.tessdata-path=${DOCUMENT_OCR_TESSDATA_PATH:/usr/share/tesseract-ocr/5/tessdata}

app.rabbitmq.enabled=${RABBITMQ_ENABLED:true}
app.rabbitmq.exchange=${RABBITMQ_DOCUMENT_EXCHANGE:doccufleet.documents}
app.rabbitmq.parsing-queue=${RABBITMQ_DOCUMENT_PARSING_QUEUE:doccufleet.document.parsing}
app.rabbitmq.parsing-routing-key=${RABBITMQ_DOCUMENT_PARSING_ROUTING_KEY:document.parse}
app.rabbitmq.dead-letter-exchange=${RABBITMQ_DOCUMENT_DLX:doccufleet.documents.dlx}
app.rabbitmq.dead-letter-queue=${RABBITMQ_DOCUMENT_DLQ:doccufleet.document.parsing.dlq}
app.rabbitmq.dead-letter-routing-key=${RABBITMQ_DOCUMENT_DLQ_ROUTING_KEY:document.parse.failed}
app.rabbitmq.publisher-confirm-timeout-ms=${RABBITMQ_PUBLISHER_CONFIRM_TIMEOUT_MS:5000}
app.rabbitmq.outbox-publish-interval-ms=${RABBITMQ_OUTBOX_PUBLISH_INTERVAL_MS:1000}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:fleet}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:fleet}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.prefetch=1

springdoc.swagger-ui.url=/api/documents/v3/api-docs
springdoc.swagger-ui.config-url=/api/documents/v3/api-docs/swagger-config
springdoc.swagger-ui.oauth2-redirect-url=/api/documents/swagger-ui/oauth2-redirect.html
