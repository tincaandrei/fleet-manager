# App runs in Docker network; database host is the Postgres service/container name
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://document-postgres:5432/document_deploy}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:document_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:document_password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.h2.console.enabled=false
