services:
  # Traefik API Gateway
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - fleet-net
    ports:
      - "80:80"
      - "8081:8080" # Traefik dashboard
    volumes:
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/dynamic_conf.yml:/dynamic_conf.yml:ro

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: fleet/frontend:local
    container_name: frontend
    restart: unless-stopped
    networks:
      - fleet-net
    expose:
      - "80"

  # Auth Service from auth-service directory
  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-auth_deploy}
      POSTGRES_USER: ${AUTH_DB_USER:-auth_user}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:?Set AUTH_DB_PASSWORD in .env}
    volumes:
      - auth-postgres-data-v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fleet-net
    ports:
      - "127.0.0.1:${AUTH_DB_HOST_PORT:-5432}:5432"
    expose:
      - "5432"

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    image: fleet/auth-service:local
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      auth-postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-postgres:5432/${AUTH_DB_NAME:-auth_deploy}
      SPRING_DATASOURCE_USERNAME: ${AUTH_DB_USER:-auth_user}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DB_PASSWORD:?Set AUTH_DB_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?Set BOOTSTRAP_ADMIN_PASSWORD in .env}
      PROFILE_IMAGE_STORAGE_PATH: /app/profile-images
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      INVITATION_EXPIRY_HOURS: ${INVITATION_EXPIRY_HOURS:-24}
      MAIL_HOST: ${MAIL_HOST:?Set MAIL_HOST in .env}
      MAIL_PORT: ${MAIL_PORT:?Set MAIL_PORT in .env}
      MAIL_USERNAME: ${MAIL_USERNAME:?Set MAIL_USERNAME in .env}
      MAIL_PASSWORD: ${MAIL_PASSWORD:?Set MAIL_PASSWORD in .env}
      MAIL_FROM: ${MAIL_FROM:?Set MAIL_FROM in .env}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}
      MAIL_DEBUG: ${MAIL_DEBUG:-false}
    volumes:
      - auth-profile-image-data:/app/profile-images
    networks:
      - fleet-net
    expose:
      - "8080"
  # Fleet Service
  fleet-postgres:
    image: postgres:16-alpine
    container_name: fleet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${FLEET_DB_NAME:-fleet_deploy}
      POSTGRES_USER: ${FLEET_DB_USER:-fleet_user}
      POSTGRES_PASSWORD: ${FLEET_DB_PASSWORD:?Set FLEET_DB_PASSWORD in .env}
    volumes:
      - fleet-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fleet-net
    ports:
      - "127.0.0.1:${FLEET_DB_HOST_PORT:-5433}:5432"
    expose:
      - "5432"

  fleet-service:
    build:
      context: ./fleet-service
      dockerfile: Dockerfile
    image: fleet/fleet-service:local
    container_name: fleet-service
    restart: unless-stopped
    depends_on:
      fleet-postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      VEHICLE_IMAGE_STORAGE_PATH: /app/vehicle-images
      SPRING_DATASOURCE_URL: jdbc:postgresql://fleet-postgres:5432/${FLEET_DB_NAME:-fleet_deploy}
      SPRING_DATASOURCE_USERNAME: ${FLEET_DB_USER:-fleet_user}
      SPRING_DATASOURCE_PASSWORD: ${FLEET_DB_PASSWORD:?Set FLEET_DB_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
    volumes:
      - fleet-vehicle-image-data:/app/vehicle-images
    networks:
      - fleet-net
    expose:
      - "8080"

  # Document Service
  document-postgres:
    image: postgres:16-alpine
    container_name: document-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DOCUMENT_DB_NAME:-document_deploy}
      POSTGRES_USER: ${DOCUMENT_DB_USER:-document_user}
      POSTGRES_PASSWORD: ${DOCUMENT_DB_PASSWORD:?Set DOCUMENT_DB_PASSWORD in .env}
    volumes:
      - document-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fleet-net
    ports:
      - "127.0.0.1:${DOCUMENT_DB_HOST_PORT:-5434}:5432"
    expose:
      - "5432"

  document-service:
    build:
      context: ./document-service
      dockerfile: Dockerfile
    image: fleet/document-service:local
    container_name: document-service
    restart: unless-stopped
    depends_on:
      document-postgres:
        condition: service_healthy
      fleet-service:
        condition: service_started
      auth-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://document-postgres:5432/${DOCUMENT_DB_NAME:-document_deploy}
      SPRING_DATASOURCE_USERNAME: ${DOCUMENT_DB_USER:-document_user}
      SPRING_DATASOURCE_PASSWORD: ${DOCUMENT_DB_PASSWORD:?Set DOCUMENT_DB_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      FLEET_SERVICE_URL: http://fleet-service:8080
      AUTH_SERVICE_URL: http://auth-service:8080
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY in .env}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      OPENAI_TIMEOUT: ${OPENAI_TIMEOUT:-60s}
      OPENAI_MAX_OUTPUT_TOKENS: ${OPENAI_MAX_OUTPUT_TOKENS:-1500}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0}
      DOCUMENT_STORAGE_PATH: /app/document-storage
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-fleet}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-fleet}
    volumes:
      - document-storage-data:/app/document-storage
    networks:
      - fleet-net
    expose:
      - "8080"

  # RabbitMQ broker for service communication
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-fleet}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-fleet}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - fleet-net
    ports:
      - "127.0.0.1:${RABBITMQ_AMQP_HOST_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_HOST_PORT:-15672}:15672"
    expose:
      - "5672"
      - "15672"

volumes:
  auth-postgres-data-v2:
  auth-profile-image-data:
  fleet-postgres-data:
  fleet-vehicle-image-data:
  document-postgres-data:
  document-storage-data:
  rabbitmq-data:

networks:
  fleet-net:
    driver: bridge
