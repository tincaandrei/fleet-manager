services:
  # Traefik API Gateway
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - fleet-net
    ports:
      - "80:80"
      - "8081:8080" # Traefik dashboard
    volumes:
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/dynamic_conf.yml:/dynamic_conf.yml:ro

  # Auth Service from auth-service directory
  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-auth_deploy}
      POSTGRES_USER: ${AUTH_DB_USER:-auth_user}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:?Set AUTH_DB_PASSWORD in .env}
    volumes:
      - auth-postgres-data-v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fleet-net
    ports:
      - "127.0.0.1:${AUTH_DB_HOST_PORT:-5432}:5432"
    expose:
      - "5432"

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    image: fleet/auth-service:local
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      auth-postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-postgres:5432/${AUTH_DB_NAME:-auth_deploy}
      SPRING_DATASOURCE_USERNAME: ${AUTH_DB_USER:-auth_user}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DB_PASSWORD:?Set AUTH_DB_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?Set BOOTSTRAP_ADMIN_PASSWORD in .env}
    networks:
      - fleet-net
    expose:
      - "8080"

  # Fleet Service
  fleet-postgres:
    image: postgres:16-alpine
    container_name: fleet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${FLEET_DB_NAME:-fleet_deploy}
      POSTGRES_USER: ${FLEET_DB_USER:-fleet_user}
      POSTGRES_PASSWORD: ${FLEET_DB_PASSWORD:?Set FLEET_DB_PASSWORD in .env}
    volumes:
      - fleet-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fleet-net
    ports:
      - "127.0.0.1:${FLEET_DB_HOST_PORT:-5433}:5432"
    expose:
      - "5432"

  fleet-service:
    build:
      context: ./fleet-service
      dockerfile: Dockerfile
    image: fleet/fleet-service:local
    container_name: fleet-service
    restart: unless-stopped
    depends_on:
      fleet-postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://fleet-postgres:5432/${FLEET_DB_NAME:-fleet_deploy}
      SPRING_DATASOURCE_USERNAME: ${FLEET_DB_USER:-fleet_user}
      SPRING_DATASOURCE_PASSWORD: ${FLEET_DB_PASSWORD:?Set FLEET_DB_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
    networks:
      - fleet-net
    expose:
      - "8080"

  # Document Service
  document-postgres:
    image: postgres:16-alpine
    container_name: document-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DOCUMENT_DB_NAME:-document_deploy}
      POSTGRES_USER: ${DOCUMENT_DB_USER:-document_user}
      POSTGRES_PASSWORD: ${DOCUMENT_DB_PASSWORD:?Set DOCUMENT_DB_PASSWORD in .env}
    volumes:
      - document-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fleet-net
    ports:
      - "127.0.0.1:${DOCUMENT_DB_HOST_PORT:-5434}:5432"
    expose:
      - "5432"

  document-service:
    build:
      context: ./document-service
      dockerfile: Dockerfile
    image: fleet/document-service:local
    container_name: document-service
    restart: unless-stopped
    depends_on:
      document-postgres:
        condition: service_healthy
      fleet-service:
        condition: service_started
      auth-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://document-postgres:5432/${DOCUMENT_DB_NAME:-document_deploy}
      SPRING_DATASOURCE_USERNAME: ${DOCUMENT_DB_USER:-document_user}
      SPRING_DATASOURCE_PASSWORD: ${DOCUMENT_DB_PASSWORD:?Set DOCUMENT_DB_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      FLEET_SERVICE_URL: http://fleet-service:8080
      DOCUMENT_STORAGE_PATH: /app/document-storage
      DOCUMENT_PARSER_PYTHON: /opt/document-parser-venv/bin/python
      DOCUMENT_PARSER_SCRIPT_PATH: /app/parser/parse_inspection_pdf.py
    volumes:
      - document-storage-data:/app/document-storage
    networks:
      - fleet-net
    expose:
      - "8080"

volumes:
  auth-postgres-data-v2:
  fleet-postgres-data:
  document-postgres-data:
  document-storage-data:

networks:
  fleet-net:
    driver: bridge
